name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure PR targets main
        run: |
          echo "Pull request targeting main has been validated."
          echo "Branch protection is active – all changes must go through a pull request."
